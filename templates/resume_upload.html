{% extends "layout.html" %}
{% block content %}

<h2>Upload Resume</h2>

<form method="POST" enctype="multipart/form-data" class="card form">
    <input type="file" name="resume" required>
    <button type="submit" class="btn primary">Upload</button>
</form>

{% endblock %}

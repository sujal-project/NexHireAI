{% extends "layout.html" %}
{% block content %}

<h2>Resume Score</h2>

<div class="card">
    <h3>Score: {{ score }}/100</h3>

    <h4>Extracted Skills:</h4>
    <ul>
        {% for s in skills %}
            <li>{{ s }}</li>
        {% endfor %}
    </ul>
</div>

{% endblock %}

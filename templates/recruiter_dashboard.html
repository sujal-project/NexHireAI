{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Recruiter Dashboard</h2>

    <!-- Jobs List -->
    <div class="row">
        {% for job in jobs %}
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm p-3">

                <h4>{{ job[1] }}</h4>
                <p><b>Company:</b> {{ job[2] }}</p>
                <p><b>Location:</b> {{ job[5] }}</p>

                <a href="/job-applicants/{{ job[0] }}" class="btn btn-primary btn-sm">
                    View Applicants
                </a>

            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Simple Chart Placeholder (SAFE - no Undefined error) -->
    <div class="mt-5">
        <h4>Analytics</h4>

        <canvas id="jobChart" height="100"></canvas>
    </div>

</div>

<!-- Chart JS SAFE VERSION -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const ctx = document.getElementById('jobChart');

    if (!ctx) {
        console.error("Chart canvas not found");
        return;
    }

    // SAFE parsing from Flask → JS
    const jobTitles = JSON.parse('{{ job_titles | default([]) | tojson | safe }}');
    const jobCounts = JSON.parse('{{ job_counts | default([]) | tojson | safe }}');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: jobTitles,
            datasets: [{
                label: 'Applications per Job',
                data: jobCounts,
                backgroundColor: 'rgba(54, 162, 235, 0.6)'
            }]
        }
    });

});
</script>

{% endblock %}

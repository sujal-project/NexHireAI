{% extends "layout.html" %}
{% block content %}

<h2>Recruiter Dashboard</h2>

<canvas id="jobChart"></canvas>

<script>
const ctx = document.getElementById('jobChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ job_titles | tojson }},
        datasets: [{
            label: 'Applications',
            data: {{ job_counts | tojson }},
            backgroundColor: 'blue'
        }]
    }
});
</script>

{% for job in jobs %}
<div class="card">
    <h3>{{ job[1] }}</h3>
    <a href="/job-applicants/{{ job[0] }}" class="btn btn-primary">
        View Applicants
    </a>
</div>
{% endfor %}

{% endblock %}

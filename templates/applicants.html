{% extends "layout.html" %}
{% block content %}

<h2>Applicants</h2>

{% for a in applicants %}
<div class="card">
    <h4>{{ a[0] }}</h4>
    <p>{{ a[1] }}</p>
    
    {% if a[2] %}
        <a href="/resume/{{ a[2] }}" target="_blank" class="btn success">
            View Resume
        </a>
    {% else %}
    <span>No Resume</span>
    {% endif %}

</div>
{% endfor %}

{% endblock %}
